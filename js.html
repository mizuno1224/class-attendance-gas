      h += '</tr></thead><tbody>';

      students.forEach(st => {
        h += `<tr><td class="col-fixed-name">${st.number}.${st.name}</td>`;
        tests.forEach(t => {
          const keyK = `${st.number}__${t.testId}__K`;
          const keyT = `${st.number}__${t.testId}__T`;
          const valK = testEdits[keyK] !== undefined ? testEdits[keyK] : (testData.scores[st.number] && testData.scores[st.number][t.testId] ? testData.scores[st.number][t.testId].scoreKnowledge : '');
          const valT = testEdits[keyT] !== undefined ? testEdits[keyT] : (testData.scores[st.number] && testData.scores[st.number][t.testId] ? testData.scores[st.number][t.testId].scoreThinking : '');
          
          h += `<td><input type="number" class="master-input" style="width:50px;" value="${valK}" onchange="updateTestScore('${st.number}', '${t.testId}', 'K', this.value)"></td>`;
          h += `<td><input type="number" class="master-input" style="width:50px;" value="${valT}" onchange="updateTestScore('${st.number}', '${t.testId}', 'T', this.value)"></td>`;
        });
        h += '</tr>';
      });
      h += '</tbody></table>';
      document.getElementById('subj-test-table-wrapper').innerHTML = h;
    }

    window.updateTestScore = function(num, testId, type, val) {
      testEdits[`${num}__${testId}__${type}`] = val;
      updateSaveBtnState();
    };

    function saveTestScores() {
      const g = document.getElementById('subj-grade').value;
      const c = document.getElementById('subj-class').value;
      const s = currentSubjId;
      if (!g || !c) { showToast('学年・組を選択してから保存してください', true); return; }
      if (!s) { showToast('科目を選択してから保存してください', true); return; }
      const records = [];
      const studentTests = {};
      Object.keys(testEdits).forEach(k => {
        const [num, testId, type] = k.split('__');
        if (!studentTests[num]) studentTests[num] = {};
        if (!studentTests[num][testId]) studentTests[num][testId] = {};
        studentTests[num][testId][type] = testEdits[k];
      });

      Object.keys(studentTests).forEach(num => {
        Object.keys(studentTests[num]).forEach(testId => {
          const rec = {
            studentNumber: num,
            testId: testId,
            scoreKnowledge: studentTests[num][testId]['K'],
            scoreThinking: studentTests[num][testId]['T']
          };
          // Existing data from testData.scores
          if (rec.scoreKnowledge === undefined && testData.scores[num] && testData.scores[num][testId]) rec.scoreKnowledge = testData.scores[num][testId].scoreKnowledge;
          if (rec.scoreThinking === undefined && testData.scores[num] && testData.scores[num][testId]) rec.scoreThinking = testData.scores[num][testId].scoreThinking;
          records.push(rec);
        });
      });

      if (!records.length) return;
      const btn = document.getElementById('subj-test-save-btn');
      btn.disabled = true; btn.textContent = '保存中...';
      google.script.run.withSuccessHandler(() => {
        showToast('保存しました');
        testEdits = {};
        restoreSaveButton(btn, 'テスト保存');
        loadSubjTests();
      }).withFailureHandler(onFailure).saveSubjectTestScores({grade:g, className:c, subjectId:s, records:records});
    }

    function loadSubjSubmissions() {
      const g = document.getElementById('subj-grade').value;
      const c = document.getElementById('subj-class').value;
      const s = currentSubjId;
      if(!g || !c || !s) return;
      renderSkeleton('subj-submission-table-wrapper');
      submissionEdits = {};
      updateSaveBtnState();
      google.script.run.withSuccessHandler(data => {
        submissionData = data;
        renderSubjSubmissionTable();
      }).withFailureHandler(onFailure).getSubjectSubmissionData({grade:g, className:c, subjectId:s});
    }

    function renderSubjSubmissionTable() {
      if (!submissionData) return;
      const students = submissionData.students;
      const submissions = submissionData.submissionMaster;
      let h = `<table class="attendance-table"><thead><tr><th class="col-fixed-name">氏名</th>`;
      submissions.forEach(s => {
        h += `<th>${s.submissionName}</th>`;
      });
      h += '</tr></thead><tbody>';

      students.forEach(st => {
        h += `<tr><td class="col-fixed-name">${st.number}.${st.name}</td>`;
        submissions.forEach(s => {
          const key = `${st.number}__${s.submissionId}`;
          const val = submissionEdits[key] !== undefined ? submissionEdits[key] : (submissionData.records[st.number] && submissionData.records[st.number][s.submissionId] ? submissionData.records[st.number][s.submissionId] : '');
          
          let cls = 'st-noclass';
          if (val === '○') cls = 'st-present';
          else if (val === '△') cls = 'st-partial';
          else if (val === '✕') cls = 'st-absent';

          h += `<td>
            <div class="cell-status ${cls}" style="cursor:pointer;" onclick="toggleSubmissionStatus('${st.number}', '${s.submissionId}', this)">${val || '-'}</div>
          </td>`;
        });
        h += '</tr>';
      });
      h += '</tbody></table>';
      document.getElementById('subj-submission-table-wrapper').innerHTML = h;
    }

    window.toggleSubmissionStatus = function(num, subId, el) {
      const cur = el.textContent;
      let next = '';
      if (cur === '-' || cur === '') next = '○';
      else if (cur === '○') next = '△';
      else if (cur === '△') next = '✕';
      else next = '○';
      
      el.textContent = next;
      el.className = 'cell-status ' + (next==='○'?'st-present':(next==='△'?'st-partial':'st-absent'));
      submissionEdits[`${num}__${subId}`] = next;
      updateSaveBtnState();
    };

    function saveSubmissions() {
      const g = document.getElementById('subj-grade').value;
      const c = document.getElementById('subj-class').value;
      const s = currentSubjId;
      if (!g || !c) { showToast('学年・組を選択してから保存してください', true); return; }
      if (!s) { showToast('科目を選択してから保存してください', true); return; }
      const records = [];
      Object.keys(submissionEdits).forEach(k => {
        const [num, subId] = k.split('__');
        records.push({
          studentNumber: num,
          submissionId: subId,
          status: submissionEdits[k]
        });
      });

      if (!records.length) return;
      const btn = document.getElementById('subj-submission-save-btn');
      btn.disabled = true; btn.textContent = '保存中...';
      google.script.run.withSuccessHandler(() => {
        showToast('保存しました');
        submissionEdits = {};
        restoreSaveButton(btn, '提出物保存');
        loadSubjSubmissions();
      }).withFailureHandler(onFailure).saveSubjectSubmissions({grade:g, className:c, subjectId:s, records:records});
    }

    function loadSubjSummary() {
      const g = document.getElementById('subj-grade').value;
      const c = document.getElementById('subj-class').value;
      const s = currentSubjId;
      if(!g || !c || !s) return;
      renderSkeleton('subj-summary-table-wrapper');
      google.script.run.withSuccessHandler(data => {
        renderSubjSummaryTable(data);
      }).withFailureHandler(onFailure).getSubjectSummaryData({grade:g, className:c, subjectId:s});
    }

    function renderSubjSummaryTable(data) {
      const students = data.students;
      const tests = data.testMaster;
      let h = `<table class="attendance-table"><thead><tr>
        <th rowspan="2" class="col-fixed-name">氏名</th>
        <th colspan="3">観点① 知識技能 (テスト)</th>
        <th colspan="3">観点② 思考判断 (テスト)</th>
        <th colspan="3">観点③ 態度 (提出物)</th>
      </tr><tr>
        <th>得点率</th><th>判定</th><th>詳細</th>
        <th>得点率</th><th>判定</th><th>詳細</th>
        <th>得点率</th><th>判定</th><th>詳細</th>
      </tr></thead><tbody>`;

      students.forEach(st => {
        const scores = data.scores[st.number] || {};
        const subms = data.submissions[st.number] || {};

        // Calculate Criteria 1 & 2
        let totalK = 0, totalMaxK = 0;
        let totalT = 0, totalMaxT = 0;
        tests.forEach(t => {
          if (scores[t.testId]) {
            totalK += Number(scores[t.testId].scoreKnowledge || 0);
            totalMaxK += Number(t.weightKnowledge || 0);
            totalT += Number(scores[t.testId].scoreThinking || 0);
            totalMaxT += Number(t.weightThinking || 0);
          }
        });

        const rateK = totalMaxK > 0 ? (totalK / totalMaxK) : 0;
        const judgeK = rateK >= 0.7 ? 'A' : (rateK >= 0.35 ? 'B' : 'C');
        const rateT = totalMaxT > 0 ? (totalT / totalMaxT) : 0;
        const judgeT = rateT >= 0.7 ? 'A' : (rateT >= 0.35 ? 'B' : 'C');

        // Calculate Criteria 3
        let totalS = 0, totalMaxS = 0;
        data.submissionMaster.forEach(sm => {
          totalMaxS += 1;
          const status = subms[sm.submissionId];
          if (status === '○') totalS += 1;
          else if (status === '△') totalS += 0.5;
        });
        const rateS = totalMaxS > 0 ? (totalS / totalMaxS) : 0;
        const judgeS = rateS >= 0.8 ? 'A' : (rateS >= 0.5 ? 'B' : 'C');

        h += `<tr>
          <td>${st.number}.${st.name}</td>
          <td>${(rateK * 100).toFixed(1)}%</td><td><b class="judge-${judgeK}">${judgeK}</b></td><td style="font-size:10px;">${totalK}/${totalMaxK}</td>
          <td>${(rateT * 100).toFixed(1)}%</td><td><b class="judge-${judgeT}">${judgeT}</b></td><td style="font-size:10px;">${totalT}/${totalMaxT}</td>
          <td>${(rateS * 100).toFixed(1)}%</td><td><b class="judge-${judgeS}">${judgeS}</b></td><td style="font-size:10px;">${totalS}/${totalMaxS}</td>
        </tr>`;
      });

      h += '</tbody></table>';
      h += `<style>
        .judge-A { color: #2563eb; }
        .judge-B { color: #059669; }
        .judge-C { color: #dc2626; }
      </style>`;
      document.getElementById('subj-summary-table-wrapper').innerHTML = h;
    }

    window.onload = init;
</script>
